<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#000"/>

  <!-- Candlestick chart — main element -->
  <g transform="translate(56, 100)">
    <!-- Wicks -->
    <line x1="40" y1="60" x2="40" y2="280" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="100" y1="100" x2="100" y2="310" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="160" y1="40" x2="160" y2="260" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="220" y1="80" x2="220" y2="300" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="280" y1="20" x2="280" y2="240" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="340" y1="50" x2="340" y2="200" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Candle bodies -->
    <rect x="24" y="120" width="32" height="100" rx="4" fill="#34d399"/>
    <rect x="84" y="140" width="32" height="110" rx="4" fill="#fb7185"/>
    <rect x="144" y="80" width="32" height="120" rx="4" fill="#34d399"/>
    <rect x="204" y="130" width="32" height="100" rx="4" fill="#fb7185"/>
    <rect x="264" y="60" width="32" height="120" rx="4" fill="#34d399"/>
    <rect x="324" y="70" width="32" height="90" rx="4" fill="#34d399"/>
  </g>

  <!-- Rising trend line — glowing -->
  <g filter="url(#gl)">
    <line x1="80" y1="360" x2="420" y2="140" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Trend line glow trail -->
  <line x1="80" y1="360" x2="420" y2="140" stroke="#34d399" stroke-width="16" stroke-linecap="round" opacity="0.08"/>

  <!-- Arrow tip on trend line -->
  <polygon points="420,140 400,148 405,162" fill="#6ee7b7" filter="url(#gl)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="56" y1="160" x2="456" y2="160"/>
    <line x1="56" y1="220" x2="456" y2="220"/>
    <line x1="56" y1="280" x2="456" y2="280"/>
    <line x1="56" y1="340" x2="456" y2="340"/>
  </g>
</svg>
